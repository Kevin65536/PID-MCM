_base_: "./highwl_base.yaml"

experiment:
  name: "s2_croce_local_highwl_gpu_probe"
  device: "cuda:1"
  description: "Croce local highWL-only GPU utilization probe with larger batches and sparse validation"

data:
  cache_npz_handles: true
  max_npz_cache_size: 128
  num_workers: 8
  dataloader:
    persistent_workers: true
    prefetch_factor: 2
    drop_last: true

training:
  batch_size: 384
  epochs: 30
  performance:
    tf32: true
    matmul_precision: "high"
  validation:
    interval_epochs: 2
    start_epoch: 1
    max_batches: 48
  early_stopping:
    enabled: true
    start_epoch: 1
    patience: 8
  checkpoint:
    save_every: 0
