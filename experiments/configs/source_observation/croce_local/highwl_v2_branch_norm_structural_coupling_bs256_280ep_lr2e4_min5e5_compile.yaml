_base_: "./highwl_v2_branch_norm_structural_coupling_lr2e4_compile.yaml"

experiment:
  name: "s2_croce_local_highwl_v2_branch_norm_structural_coupling_bs256_280ep_lr2e4_min5e5_compile"
  device: "cuda:1"
  description: "Croce local highWL v2 structural coupling retry after removing association loss; batch size 256, 280 epochs, LR 2e-4, min LR 5e-5."

training:
  batch_size: 256
  epochs: 280
  min_lr: 0.00005
  early_stopping:
    enabled: true
    start_epoch: 61
    patience: 140
    metric: "val_loss"
    mode: "min"

data:
  max_npz_cache_size: 256
  dataloader:
    persistent_workers: true
    prefetch_factor: 6
    in_order: false
    pin_memory: true
    drop_last: true
