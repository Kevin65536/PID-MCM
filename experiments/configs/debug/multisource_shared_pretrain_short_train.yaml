_base_: "../phase0plus/shared_labram_vqnsp_eeg_fnirs_10s_2s.yaml"

experiment:
  name: "debug_multisource_shared_pretrain_short_train"
  description: "Short smoke training on mixed Single-Trial + Simultaneous WG + Simultaneous n-back"
  device: "cpu"
  seed: 42

data:
  modality: "both"
  normalization:
    enabled: true
    mode: "session"
  window:
    duration_s: 10.0
    offset_ms: 0.0
  num_workers: 0
  multi_source:
    eeg_channel_strategy: "union_pad"
    fnirs_channel_strategy: "identity"
  sources:
    - name: "single_trial_mi"
      dataset: "eeg_fnirs_single_trial"
      data_root: "data/EEG+NIRS Single-Trial"
      task: "motor_imagery"
      split:
        train_subjects: [1]
        val_subjects: [2]
        test_subjects: [3]
      exclude_eog: true
      hbo_only: true
      hbr_only: false
      eeg_preprocessing:
        bandpass: [0.5, 45]
      fnirs_preprocessing:
        highpass: 0.01
        lowpass: 0.2
    - name: "simultaneous_wg"
      dataset: "simultaneous_eeg_nirs"
      data_root: "data/Simultaneous EEG&NIRS"
      task: "wg"
      split:
        train_subjects: [1]
        val_subjects: [2]
        test_subjects: [3]
      dataset_params:
        segmentation_mode: "auto"
      exclude_eog: true
      hbo_only: true
      hbr_only: false
      eeg_preprocessing:
        bandpass: [0.5, 45]
      fnirs_preprocessing:
        highpass: 0.01
        lowpass: 0.2
    - name: "simultaneous_nback"
      dataset: "simultaneous_eeg_nirs"
      data_root: "data/Simultaneous EEG&NIRS"
      task: "nback"
      split:
        train_subjects: [1]
        val_subjects: [2]
        test_subjects: [3]
      dataset_params:
        segmentation_mode: "auto"
      exclude_eog: true
      hbo_only: true
      hbr_only: false
      eeg_preprocessing:
        bandpass: [0.5, 45]
      fnirs_preprocessing:
        highpass: 0.01
        lowpass: 0.2

model:
  eeg:
    seq_length: 2000
    patch_size: 200
    channels: 48
    encoder_embed_dim: 96
    encoder_depth: 2
    encoder_num_heads: 4
    decoder_embed_dim: 96
    decoder_depth: 2
    decoder_num_heads: 4
  fnirs:
    seq_length: 100
    patch_size: 10
    channels: 36
    encoder_embed_dim: 64
    encoder_depth: 2
    encoder_num_heads: 4
    decoder_embed_dim: 64
    decoder_depth: 2
    decoder_num_heads: 4
  quantizer:
    codebook_size: 128
    codebook_dim: 32
    beta: 1.0
    decay: 0.99
    kmeans_init: false
    revive_dead_codes: false
    dead_code_threshold: 10
  dropout: 0.0
  drop_path: 0.0

token_spec:
  eeg_patch_size_samples: 200
  eeg_patch_size_seconds: 1.0
  fnirs_patch_size_samples: 10
  fnirs_patch_size_seconds: 1.0
  tokens_per_window: 10
  codebook_size: 128

loss:
  alignment:
    latent_weight: 0.05
    assignment_weight: 0.02
    temperature: 0.20

training:
  epochs: 1
  batch_size: 4
  learning_rate: 0.0002
  weight_decay: 0.0
  warmup_epochs: 0
  min_lr: 1.0e-6
  checkpoint:
    save_every: 1
  early_stopping:
    enabled: false

logging:
  save_checkpoint_every: 1